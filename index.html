<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!--
      Critical inline CSS — applied before ANY external resource loads.
      Prevents white/unstyled flash on first paint by establishing:
        • dark background   (#0a0a0a) so the page is never white
        • text colour       (#f5f5f0) so text is never black-on-white
        • system font stack so text is never in browser-default serif
        • root min-height   so there is no layout-height collapse
        • box-sizing reset  so nothing shifts when full CSS applies
    -->
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      :root { color-scheme: dark; }
      html {
        background: #0a0a0a;
      }
      body {
        background: #0a0a0a;
        color: #f5f5f0;
        margin: 0;
        padding: 0;
        font-family: Arial, 'Arial Narrow', sans-serif;
        font-size: 16px;
        line-height: 1.6;
        overflow-x: hidden;
      }
      #root {
        background: #0a0a0a;
        min-height: 100vh;
      }
    </style>

    <!-- Icons -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#c8ff00">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>ToolScout — The AI Tools Directory</title>
    <meta name="description" content="Find the right AI tool for any problem. Intent-first AI tools directory with 200+ curated tools." />

    <!--
      Fonts — loaded NON-render-blocking via the media="print" pattern.
      The preconnects ensure the DNS/TLS handshake to Google's font servers
      is already done before the stylesheet requests the actual font files.
      The print→all swap happens as soon as the CSS downloads, with no
      paint delay. display=swap in the URL means text renders in the Arial
      fallback immediately, then swaps to Syne/Epilogue when ready.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
