<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ── Critical CSS: prevents white/unstyled flash before external CSS loads ── -->
    <style>
      :root { color-scheme: dark; }
      html, body, #root {
        background: #0a0a0a;
        margin: 0;
        padding: 0;
      }
      body {
        color: #f5f5f0;
        font-family: Arial, sans-serif;
      }
      #root { min-height: 100vh; }
    </style>

    <!-- ── Icons ── -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="theme-color" content="#c8ff00">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── SEO ── -->
    <title>ToolScout — The AI Tools Directory</title>
    <meta name="description" content="Find the right AI tool for any problem. Intent-first AI tools directory with 200+ curated tools." />

    <!-- ── Fonts: preconnect then load with swap ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Epilogue:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
